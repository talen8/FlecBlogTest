<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlecPanel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 220px;
      background: #fff;
      border-right: 1px solid #e8e8e8;
      padding: 20px 0;
      position: fixed;
      height: 100vh;
    }

    .sidebar-header {
      padding: 0 20px 20px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 12px;
    }

    .sidebar-header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .nav-item {
      padding: 10px 20px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: #f5f5f5;
      color: #333;
    }

    .nav-item.active {
      background: #e6f4ff;
      color: #1890ff;
    }

    .main {
      flex: 1;
      margin-left: 220px;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .content {
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-header h3 {
      font-size: 15px;
      font-weight: 600;
    }

    .card-body {
      padding: 20px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-item {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      padding: 20px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-label {
      color: #999;
      font-size: 13px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }

    th {
      font-weight: 500;
      color: #999;
      font-size: 13px;
    }

    tr:hover td {
      background: #fafafa;
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn:hover {
      border-color: #1890ff;
      color: #1890ff;
    }

    .btn-primary {
      background: #1890ff;
      border-color: #1890ff;
      color: #fff;
    }

    .btn-primary:hover {
      background: #40a9ff;
      border-color: #40a9ff;
      color: #fff;
    }

    .btn-danger {
      color: #ff4d4f;
      border-color: #ff4d4f;
    }

    .btn-danger:hover {
      background: #ff4d4f;
      color: #fff;
    }

    .btn-sm {
      padding: 4px 12px;
      font-size: 13px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    .badge-success { background: #f6ffed; color: #52c41a; }
    .badge-default { background: #fafafa; color: #999; }
    .badge-info { background: #e6f7ff; color: #1890ff; }

    .form-item {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #333;
    }

    .form-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      font-size: 14px;
    }

    .form-input:focus {
      outline: none;
      border-color: #1890ff;
    }

    .form-hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background: #fff;
      border-radius: 8px;
      width: 100%;
      max-width: 440px;
    }

    .modal-head {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-head h3 {
      font-size: 15px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      color: #999;
      cursor: pointer;
      line-height: 1;
    }

    .modal-close:hover {
      color: #333;
    }

    .modal-body {
      padding: 20px;
      max-height: 65vh;
      overflow-y: auto;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .switch .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.2s;
    }
    .switch .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .switch input:checked + .slider {
      background: #52c41a;
    }
    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }

    .modal-foot {
      padding: 12px 20px;
      border-top: 1px solid #f0f0f0;
      text-align: right;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      transition: transform 0.3s;
      z-index: 200;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .hidden { display: none !important; }

    .loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
    }

    .upload-area {
      border: 2px dashed #d9d9d9;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .upload-area:hover {
      border-color: #1890ff;
      background: rgba(24, 144, 255, 0.03);
    }

    .upload-area.has-image {
      border-color: #52c41a;
      padding: 6px;
    }

    .upload-placeholder {
      color: #999;
      font-size: 13px;
    }

    .upload-preview {
      max-height: 140px;
      border-radius: 4px;
      display: block;
      margin: 0 auto;
    }

    .upload-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 13px;
      cursor: pointer;
      line-height: 22px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="loadingPage" class="loading">
    <div>加载中...</div>
  </div>

  <!-- Admin -->
  <div id="adminPage" class="layout hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>FlecPanel</h1>
      </div>
      <nav>
        <div class="nav-item active" onclick="showPage('dashboard')">仪表盘</div>
        <div class="nav-item" onclick="showPage('versions')">版本管理</div>
        <div class="nav-item" onclick="showPage('announcements')">公告管理</div>
        <div class="nav-item" onclick="showPage('themes')">主题管理</div>
        <div class="nav-item" onclick="showPage('premium')">激活码</div>
        <div class="nav-item" onclick="showPage('settings')">系统设置</div>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <h2 id="pageTitle">仪表盘</h2>
      </header>

      <div class="content">
        <!-- Dashboard -->
        <div id="dashboardPage">
          <div class="stats">
            <div class="stat-item">
              <div class="stat-value" id="statVersions">-</div>
              <div class="stat-label">版本总数</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statEnabled">-</div>
              <div class="stat-label">已推送</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statAnnouncements">-</div>
              <div class="stat-label">公告</div>
            </div>
            <div class="stat-item">
              <div class="stat-value" id="statThemes">-</div>
              <div class="stat-label">主题</div>
            </div>
          </div>
          <div class="card" style="margin-bottom: 24px;">
            <div class="card-header">
              <h3>最新版本</h3>
              <button class="btn btn-sm" onclick="showPage('versions')">查看全部</button>
            </div>
            <table>
              <thead><tr><th>版本</th><th>日期</th><th>状态</th></tr></thead>
              <tbody id="dashboardVersionList"></tbody>
            </table>
          </div>
          <div class="card">
            <div class="card-header">
              <h3>最新公告</h3>
              <button class="btn btn-sm" onclick="showPage('announcements')">查看全部</button>
            </div>
            <table>
              <thead><tr><th>标题</th><th>内容</th><th>时间</th></tr></thead>
              <tbody id="dashboardAnnouncementList"></tbody>
            </table>
          </div>
        </div>

        <!-- Versions -->
        <div id="versionsPage" class="hidden">
          <div style="margin-bottom: 16px;">
            <button class="btn" onclick="syncGitHub()">同步 GitHub</button>
          </div>
          <div class="card">
            <table>
              <thead><tr><th>版本</th><th>日期</th><th>状态</th><th>操作</th></tr></thead>
              <tbody id="versionList"></tbody>
            </table>
          </div>
        </div>

        <!-- Announcements -->
        <div id="announcementsPage" class="hidden">
          <div style="margin-bottom: 16px;">
            <button class="btn btn-primary" onclick="openModal('annModal')">发布公告</button>
          </div>
          <div class="card">
            <table>
              <thead><tr><th>标题</th><th>内容</th><th>链接</th><th>时间</th><th>操作</th></tr></thead>
              <tbody id="annList"></tbody>
            </table>
          </div>
        </div>

        <!-- Themes -->
        <div id="themesPage" class="hidden">
          <div style="margin-bottom: 16px;">
            <button class="btn btn-primary" onclick="openThemeModal()">创建主题</button>
          </div>
          <div class="card">
            <table>
              <thead><tr><th>预览</th><th>Slug</th><th>名称</th><th>作者</th><th>版本</th><th>分类</th><th>来源</th><th>下载</th><th>状态</th><th>操作</th></tr></thead>
              <tbody id="themeList"></tbody>
            </table>
          </div>
        </div>

        <!-- Premium -->
        <div id="premiumPage" class="hidden">
          <div style="margin-bottom: 16px; display: flex; gap: 12px;">
            <button class="btn btn-primary" onclick="openGenerateModal()">批量生成</button>
            <select id="premiumFilterStatus" class="form-input" style="width:120px" onchange="loadPremiumCodes()">
              <option value="">全部状态</option>
              <option value="unused">未使用</option>
              <option value="used">已使用</option>
            </select>
          </div>
          <div class="card">
            <table>
              <thead><tr><th>激活码</th><th>天数</th><th>状态</th><th>激活时间</th><th>创建时间</th><th>操作</th></tr></thead>
              <tbody id="premiumList"></tbody>
            </table>
          </div>
        </div>

        <!-- Settings -->
        <div id="settingsPage" class="hidden">
          <div class="card" style="max-width: 500px;">
            <div class="card-header"><h3>系统设置</h3></div>
            <div class="card-body">
              <div class="form-item">
                <label class="form-label">GitHub 仓库</label>
                <input type="text" id="settingGithubRepo" class="form-input" placeholder="owner/repo" autocomplete="off">
                <div class="form-hint">每小时自动同步 Release</div>
              </div>
              <div class="form-item">
                <label class="form-label">GitHub Token</label>
                <input type="password" id="settingGithubToken" class="form-input" placeholder="ghp_xxxx" autocomplete="off">
                <div class="form-hint">可选，用于提高 API 速率限制</div>
              </div>
              <button class="btn btn-primary" onclick="saveSettings()">保存</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Version Edit Modal -->
  <div id="versionEditModal" class="modal-mask hidden">
    <div class="modal">
      <div class="modal-head">
        <h3>编辑版本</h3>
        <button class="modal-close" onclick="closeModal('versionEditModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editVersionName">
        <div class="form-item">
          <label class="form-label">版本号</label>
          <input type="text" id="editVersionDisplay" class="form-input" disabled style="background: #f5f5f5;">
        </div>
        <div class="form-item">
          <label class="form-label">发布日期</label>
          <input type="date" id="editVersionDate" class="form-input">
        </div>
        <div class="form-item">
          <label class="form-label">更新内容</label>
          <textarea id="editVersionChanges" class="form-input" style="min-height: 150px; resize: vertical;"></textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal('versionEditModal')">取消</button>
        <button class="btn btn-primary" onclick="updateVersionFromModal()">保存</button>
      </div>
    </div>
  </div>

  <!-- Announcement Modal -->
  <div id="annModal" class="modal-mask hidden">
    <div class="modal">
      <div class="modal-head">
        <h3>发布公告</h3>
        <button class="modal-close" onclick="closeModal('annModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-item">
          <label class="form-label">标题</label>
          <input type="text" id="annTitle" class="form-input">
        </div>
        <div class="form-item">
          <label class="form-label">内容</label>
          <textarea id="annContent" class="form-input" style="min-height: 100px; resize: vertical;"></textarea>
        </div>
        <div class="form-item">
          <label class="form-label">链接（可选）</label>
          <input type="text" id="annLink" class="form-input" placeholder="https://...">
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal('annModal')">取消</button>
        <button class="btn btn-primary" onclick="saveAnnouncement()">发布</button>
      </div>
    </div>
  </div>

  <!-- Theme Modal -->
  <div id="themeModal" class="modal-mask hidden">
    <div class="modal" style="max-width: 680px;">
      <div class="modal-head">
        <h3 id="themeModalTitle">创建主题</h3>
        <button class="modal-close" onclick="closeModal('themeModal')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="themeOriginalSlug">
        <div style="display:flex;gap:12px">
          <div class="form-item" style="flex:1">
            <label class="form-label">Slug <span style="color:#ff4d4f">*</span></label>
            <input type="text" id="themeSlug" class="form-input" placeholder="my-theme">
          </div>
          <div class="form-item" style="flex:1">
            <label class="form-label">名称 <span style="color:#ff4d4f">*</span></label>
            <input type="text" id="themeName" class="form-input" placeholder="我的主题">
          </div>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-item" style="flex:1">
            <label class="form-label">作者</label>
            <input type="text" id="themeAuthor" class="form-input" placeholder="作者名">
          </div>
          <div class="form-item" style="flex:1">
            <label class="form-label">来源</label>
            <select id="themeSource" class="form-input">
              <option value="community">社区主题</option>
              <option value="official">官方主题</option>
            </select>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label">描述</label>
          <textarea id="themeDescription" class="form-input" style="min-height:50px;resize:vertical" placeholder="主题描述"></textarea>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-item" style="flex:1">
            <label class="form-label">分类</label>
            <input type="text" id="themeCategory" class="form-input" placeholder="blog / portfolio / docs">
          </div>
          <div class="form-item" style="flex:none">
            <label class="form-label" style="margin-bottom:10px;display:block">是否启用</label>
            <label class="switch" style="margin-top:2px">
              <input type="checkbox" id="themeEnabled" checked>
              <span class="slider"></span>
            </label>
          </div>
          <div class="form-item" style="flex:none">
            <label class="form-label" style="margin-bottom:10px;display:block">付费主题</label>
            <label class="switch" style="margin-top:2px">
              <input type="checkbox" id="themePremium">
              <span class="slider"></span>
            </label>
          </div>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-item" style="flex:1">
            <label class="form-label">仓库地址 <span style="color:#ff4d4f">*</span></label>
            <input type="text" id="themeRepoUrl" class="form-input" placeholder="https://github.com/user/repo">
          </div>
          <div class="form-item" style="flex:1">
            <label class="form-label">演示地址</label>
            <input type="text" id="themeDemoUrl" class="form-input" placeholder="https://...">
          </div>
        </div>
        <div class="form-item">
          <label class="form-label">预览图</label>
          <div class="upload-area" onclick="document.getElementById('themePreviewInput').click()" style="padding:12px">
            <input type="file" id="themePreviewInput" accept="image/png,image/jpeg,image/webp,image/gif" onchange="handleAdminPreviewSelect(event)" style="display:none">
            <div id="adminUploadPlaceholder" class="upload-placeholder" style="font-size:13px">
              点击上传
            </div>
            <img id="adminUploadPreview" class="upload-preview" style="display:none">
            <button type="button" class="upload-remove" id="adminUploadRemove" style="display:none" onclick="removeAdminPreview(event)">×</button>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal('themeModal')">取消</button>
        <button class="btn btn-primary" onclick="saveTheme()">保存</button>
      </div>
    </div>
  </div>

  <!-- Generate Codes Modal -->
  <div id="generateModal" class="modal-mask hidden">
    <div class="modal">
      <div class="modal-head">
        <h3>批量生成激活码</h3>
        <button class="modal-close" onclick="closeModal('generateModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-item">
          <label class="form-label">天数（-1 = 永久）</label>
          <input type="number" id="genDays" class="form-input" placeholder="例如：30、365、-1" min="-1">
        </div>
        <div class="form-item">
          <label class="form-label">生成数量</label>
          <input type="number" id="genCount" class="form-input" value="10" min="1" max="500">
          <div class="form-hint">单次最多 500 个</div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="closeModal('generateModal')">取消</button>
        <button class="btn btn-primary" onclick="generateCodes()">生成</button>
      </div>
    </div>
  </div>

  <!-- Generated Codes Modal -->
  <div id="generatedCodesModal" class="modal-mask hidden">
    <div class="modal" style="max-width: 560px;">
      <div class="modal-head">
        <h3>生成成功</h3>
        <button class="modal-close" onclick="closeModal('generatedCodesModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
          <span id="generatedCodesCount" style="font-size: 14px; color: #666;"></span>
          <button class="btn btn-sm" onclick="copyGeneratedCodes()">复制全部</button>
        </div>
        <textarea id="generatedCodesText" class="form-input" style="min-height: 240px; font-family: monospace; font-size: 13px; line-height: 1.6;" readonly></textarea>
      </div>
      <div class="modal-foot">
        <button class="btn btn-primary" onclick="closeModal('generatedCodesModal')">完成</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    /**
     * 打开模态框
     */
    function openModal(id) {
      document.getElementById(id).classList.remove('hidden');
    }

    /**
     * 关闭模态框
     */
    function closeModal(id) {
      document.getElementById(id).classList.add('hidden');
    }

    /**
     * 显示提示消息
     */
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    /**
     * 切换页面
     */
    function showPage(page) {
      document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
      event.target.classList.add('active');

      const pages = ['dashboard', 'versions', 'announcements', 'themes', 'premium', 'settings'];
      const titles = { dashboard: '仪表盘', versions: '版本管理', announcements: '公告管理', themes: '主题管理', premium: '激活码', settings: '系统设置' };

      pages.forEach(p => document.getElementById(p + 'Page').classList.toggle('hidden', p !== page));
      document.getElementById('pageTitle').textContent = titles[page];

      if (page === 'versions') loadVersions();
      if (page === 'announcements') loadAnnouncements();
      if (page === 'themes') loadThemes();
      if (page === 'premium') loadPremiumCodes();
      if (page === 'settings') loadSettings();
      if (page === 'dashboard') loadDashboard();
    }

    /**
     * 加载仪表盘数据
     */
    async function loadDashboard() {
      try {
        const [vRes, aRes, tRes] = await Promise.all([
          fetch('/admin/versions?all=true'),
          fetch('/admin/announcements'),
          fetch('/admin/themes')
        ]);

        const versions = (await vRes.json()).versions || [];
        const announcements = (await aRes.json()).announcements || [];
        const themes = await tRes.json();

        document.getElementById('statVersions').textContent = versions.length;
        document.getElementById('statEnabled').textContent = versions.filter(v => v.enabled).length;
        document.getElementById('statAnnouncements').textContent = announcements.length;
        document.getElementById('statThemes').textContent = Array.isArray(themes) ? themes.length : 0;

        const tbody = document.getElementById('dashboardVersionList');
        tbody.innerHTML = versions.slice(0, 5).map(v =>
          '<tr><td><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;">' + v.version + '</code></td><td>' + v.date + '</td><td><span class="badge ' + (v.enabled ? 'badge-success' : 'badge-default') + '">' + (v.enabled ? '已推送' : '未推送') + '</span></td></tr>'
        ).join('') || '<tr><td colspan="3" class="empty">暂无数据</td></tr>';

        const annTbody = document.getElementById('dashboardAnnouncementList');
        annTbody.innerHTML = announcements.slice(0, 3).map(a =>
          '<tr><td>' + escapeHtml(a.title) + '</td><td>' + escapeHtml(a.content) + '</td><td>' + a.created_at + '</td></tr>'
        ).join('') || '<tr><td colspan="3" class="empty">暂无公告</td></tr>';
      } catch (e) {
        console.error('Load dashboard failed:', e);
        document.getElementById('statVersions').textContent = '-';
        document.getElementById('statEnabled').textContent = '-';
        document.getElementById('statAnnouncements').textContent = '-';
        document.getElementById('statThemes').textContent = '-';
        document.getElementById('dashboardVersionList').innerHTML = '<tr><td colspan="3" class="empty">加载失败</td></tr>';
        document.getElementById('dashboardAnnouncementList').innerHTML = '<tr><td colspan="3" class="empty">加载失败</td></tr>';
      }
    }

    /**
     * 加载版本列表
     */
    async function loadVersions() {
      const res = await fetch('/admin/versions?all=true');
      const data = await res.json();
      const tbody = document.getElementById('versionList');

      if (!data.versions.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">暂无版本</td></tr>';
        return;
      }

      tbody.innerHTML = data.versions.map(v => {
        const changesStr = typeof v.changes === 'string' ? v.changes : JSON.stringify(v.changes || {});
        return '<tr>' +
          '<td><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;">' + v.version + '</code></td>' +
          '<td>' + v.date + '</td>' +
          '<td><span class="badge ' + (v.enabled ? 'badge-success' : 'badge-default') + '">' + (v.enabled ? '已推送' : '未推送') + '</span></td>' +
          '<td>' +
            '<button class="btn btn-sm" data-version="' + escapeHtml(v.version) + '" data-date="' + v.date + '" data-changes="' + escapeHtml(changesStr) + '" onclick="openEditVersionModal(this)">编辑</button> ' +
            '<button class="btn btn-sm ' + (v.enabled ? '' : 'btn-primary') + '" onclick="toggleVersion(\'' + encodeURIComponent(v.version) + '\', ' + !v.enabled + ')">' + (v.enabled ? '取消推送' : '推送') + '</button> ' +
            '<button class="btn btn-sm btn-danger" onclick="deleteVersion(\'' + encodeURIComponent(v.version) + '\')">删除</button>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    /**
     * 切换版本启用状态
     */
    async function toggleVersion(version, enabled) {
      const res = await fetch('/admin/versions/' + version, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled })
      });
      const data = await res.json();
      if (data.success) {
        loadVersions();
        showToast(enabled ? '已推送' : '已取消推送');
      }
    }

    /**
     * 删除版本
     */
    async function deleteVersion(version) {
      if (!confirm('确定删除 ' + decodeURIComponent(version) + '?')) return;
      const res = await fetch('/admin/versions/' + version, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        loadVersions();
        showToast('已删除');
      }
    }

    /**
     * 打开版本编辑模态框
     */
    function openEditVersionModal(btn) {
      document.getElementById('editVersionName').value = btn.dataset.version;
      document.getElementById('editVersionDisplay').value = btn.dataset.version;
      document.getElementById('editVersionDate').value = btn.dataset.date;
      document.getElementById('editVersionChanges').value = btn.dataset.changes || '';
      openModal('versionEditModal');
    }

    /**
     * 从模态框更新版本
     */
    async function updateVersionFromModal() {
      const version = document.getElementById('editVersionName').value;
      const res = await fetch('/admin/versions/' + encodeURIComponent(version), {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          date: document.getElementById('editVersionDate').value,
          changes: document.getElementById('editVersionChanges').value
        })
      });
      const data = await res.json();
      if (data.success) {
        closeModal('versionEditModal');
        loadVersions();
        showToast('已更新');
      } else {
        showToast(data.error || '更新失败');
      }
    }

    /**
     * 加载公告列表
     */
    async function loadAnnouncements() {
      const res = await fetch('/admin/announcements');
      const data = await res.json();
      const tbody = document.getElementById('annList');

      if (!data.announcements.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无公告</td></tr>';
        return;
      }

      tbody.innerHTML = data.announcements.map(a => {
        return '<tr>' +
          '<td>' + escapeHtml(a.title) + '</td>' +
          '<td>' + escapeHtml(a.content) + '</td>' +
          '<td>' + escapeHtml(a.link || '-') + '</td>' +
          '<td>' + a.created_at + '</td>' +
          '<td>' +
            '<button class="btn btn-sm btn-danger" onclick="deleteAnnouncement(' + a.id + ')">删除</button>' +
          '</td>' +
        '</tr>';
      }).join('');
    }

    /**
     * HTML 转义
     */
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    /**
     * 保存公告
     */
    async function saveAnnouncement() {
      const body = {
        title: document.getElementById('annTitle').value,
        content: document.getElementById('annContent').value,
        link: document.getElementById('annLink').value || undefined
      };
      if (!body.title || !body.content) {
        showToast('请填写标题和内容');
        return;
      }

      const res = await fetch('/admin/announcements', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) {
        closeModal('annModal');
        document.getElementById('annTitle').value = '';
        document.getElementById('annContent').value = '';
        document.getElementById('annLink').value = '';
        loadAnnouncements();
        showToast('发布成功');
      } else {
        showToast(data.error || '发布失败');
      }
    }

    /**
     * 删除公告
     */
    async function deleteAnnouncement(id) {
      if (!confirm('确定删除?')) return;
      const res = await fetch('/admin/announcements/' + id, { method: 'DELETE' });
      const data = await res.json();
      if (data.success) {
        loadAnnouncements();
        showToast('已删除');
      }
    }

    /**
     * 加载系统设置
     */
    async function loadSettings() {
      const res = await fetch('/admin/settings');
      const data = await res.json();
      if (data.settings) {
        document.getElementById('settingGithubRepo').value = data.settings.github_repo || '';
        document.getElementById('settingGithubToken').value = data.settings.github_token || '';
      }
    }

    /**
     * 保存系统设置
     */
    async function saveSettings() {
      const res = await fetch('/admin/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          github_repo: document.getElementById('settingGithubRepo').value || undefined,
          github_token: document.getElementById('settingGithubToken').value || undefined
        })
      });
      const data = await res.json();
      if (data.success) {
        showToast('已保存');
      } else {
        showToast(data.error || '保存失败');
      }
    }

    /**
     * 同步 GitHub Releases
     */
    async function syncGitHub() {
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = '同步中...';
      const res = await fetch('/admin/versions/sync', { method: 'POST' });
      const data = await res.json();
      btn.disabled = false;
      btn.textContent = '同步 GitHub';
      if (data.success) {
        loadVersions();
        showToast('同步成功');
      } else {
        showToast(data.error || '同步失败');
      }
    }

    // ============ 主题管理 ============

    let editingThemeSlug = null;

    async function loadThemes() {
      try {
        const res = await fetch('/admin/themes');
        const themes = await res.json();
        const tbody = document.getElementById('themeList');

        if (!themes.length) {
          tbody.innerHTML = '<tr><td colspan="10" class="empty">暂无主题</td></tr>';
          return;
        }

        tbody.innerHTML = themes.map(t => {
          const previewImg = t.preview_url
            ? '<img src="' + escapeHtml(t.preview_url) + '" style="width:60px;height:40px;object-fit:cover;border-radius:4px;display:block">'
            : '<span style="color:#999;font-size:12px">无</span>';
          const isOfficial = t.source === 'official';
          return '<tr>' +
            '<td>' + previewImg + '</td>' +
            '<td><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;">' + escapeHtml(t.slug) + '</code></td>' +
            '<td>' + escapeHtml(t.name) + '</td>' +
            '<td>' + escapeHtml(t.author || '-') + '</td>' +
            '<td>v' + escapeHtml(t.version) + '</td>' +
            '<td>' + escapeHtml(t.category || '-') + '</td>' +
            '<td><span class="badge ' + (isOfficial ? 'badge-info' : 'badge-default') + '">' + (isOfficial ? '官方' : '社区') + '</span></td>' +
            '<td>' + t.downloads + '</td>' +
            '<td><span class="badge ' + (t.enabled ? 'badge-success' : 'badge-default') + '">' + (t.enabled ? '已启用' : '已禁用') + '</span></td>' +
            '<td style="white-space:nowrap">' +
              '<button class="btn btn-sm" onclick="editTheme(\'' + escapeHtml(t.slug) + '\')">编辑</button> ' +
              '<button class="btn btn-sm" onclick="checkThemeRepo(\'' + escapeHtml(t.slug) + '\')">检查</button> ' +
              '<button class="btn btn-sm btn-danger" onclick="deleteTheme(\'' + escapeHtml(t.slug) + '\')">删除</button>' +
            '</td>' +
          '</tr>';
        }).join('');
      } catch (e) {
        document.getElementById('themeList').innerHTML = '<tr><td colspan="10" class="empty">加载失败</td></tr>';
      }
    }

    function resetAdminPreview() {
      document.getElementById('themePreviewInput').value = '';
      document.getElementById('adminUploadPreview').style.display = 'none';
      document.getElementById('adminUploadPlaceholder').style.display = '';
      document.getElementById('adminUploadRemove').style.display = 'none';
      document.querySelector('.upload-area').classList.remove('has-image');
    }

    function handleAdminPreviewSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (ev) {
        document.getElementById('adminUploadPreview').src = ev.target.result;
        document.getElementById('adminUploadPreview').style.display = 'block';
        document.getElementById('adminUploadPlaceholder').style.display = 'none';
        document.getElementById('adminUploadRemove').style.display = '';
        document.querySelector('.upload-area').classList.add('has-image');
      };
      reader.readAsDataURL(file);
    }

    function removeAdminPreview(e) {
      e.stopPropagation();
      resetAdminPreview();
    }

    function openThemeModal() {
      editingThemeSlug = null;
      document.getElementById('themeModalTitle').textContent = '创建主题';
      document.getElementById('themeOriginalSlug').value = '';
      document.getElementById('themeSlug').value = '';
      document.getElementById('themeSlug').disabled = false;
      document.getElementById('themeName').value = '';
      document.getElementById('themeAuthor').value = '';
      document.getElementById('themeDescription').value = '';
      document.getElementById('themeCategory').value = '';
      document.getElementById('themeSource').value = 'community';
      document.getElementById('themeRepoUrl').value = '';
      document.getElementById('themeDemoUrl').value = '';
      document.getElementById('themeEnabled').checked = true;
      document.getElementById('themePremium').checked = false;
      resetAdminPreview();
      openModal('themeModal');
    }

    function editTheme(slug) {
      editingThemeSlug = slug;
      document.getElementById('themeModalTitle').textContent = '编辑主题';

      fetch('/admin/themes/' + encodeURIComponent(slug))
        .then(r => r.json())
        .then(theme => {
          document.getElementById('themeOriginalSlug').value = slug;
          document.getElementById('themeSlug').value = theme.slug;
          document.getElementById('themeSlug').disabled = true;
          document.getElementById('themeName').value = theme.name || '';
          document.getElementById('themeAuthor').value = theme.author || '';
          document.getElementById('themeDescription').value = theme.description || '';
          document.getElementById('themeCategory').value = theme.category || '';
          document.getElementById('themeSource').value = theme.source || 'community';
          document.getElementById('themeRepoUrl').value = theme.repo_url || '';
          document.getElementById('themeDemoUrl').value = theme.demo_url || '';
          document.getElementById('themeEnabled').checked = theme.enabled !== false;
          document.getElementById('themePremium').checked = theme.premium_required === true;
          openModal('themeModal');
        })
        .catch(() => showToast('获取主题详情失败'));
    }

    async function saveTheme() {
      const slug = document.getElementById('themeSlug').value.trim();
      const name = document.getElementById('themeName').value.trim();
      const repoUrl = document.getElementById('themeRepoUrl').value.trim();

      if (!slug) return showToast('请填写 Slug');
      if (!name) return showToast('请填写名称');
      if (!repoUrl) return showToast('请填写仓库地址');

      const isEdit = !!editingThemeSlug;
      const previewFile = document.getElementById('themePreviewInput').files[0];

      // 编辑或用 JSON（无文件）
      if (isEdit || !previewFile) {
        const body = {
          slug, name, repo_url: repoUrl,
          author: document.getElementById('themeAuthor').value.trim(),
          description: document.getElementById('themeDescription').value.trim(),
          category: document.getElementById('themeCategory').value.trim(),
          source: document.getElementById('themeSource').value,
          demo_url: document.getElementById('themeDemoUrl').value.trim(),
          enabled: document.getElementById('themeEnabled').checked,
          premium_required: document.getElementById('themePremium').checked,
        };

        try {
          const url = isEdit ? '/admin/themes/' + encodeURIComponent(editingThemeSlug) : '/admin/themes';
          const res = await fetch(url, {
            method: isEdit ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (data.success) {
            closeModal('themeModal');
            loadThemes();
            showToast(isEdit ? '已更新' : '已创建');
          } else {
            showToast(data.error || '操作失败');
          }
        } catch (e) {
          showToast('操作失败');
        }
        return;
      }

      // 创建 + 上传图片（用 FormData）
      const formData = new FormData();
      formData.append('slug', slug);
      formData.append('name', name);
      formData.append('repo_url', repoUrl);
      formData.append('author', document.getElementById('themeAuthor').value.trim());
      formData.append('description', document.getElementById('themeDescription').value.trim());
      formData.append('category', document.getElementById('themeCategory').value.trim());
      formData.append('source', document.getElementById('themeSource').value);
      formData.append('demo_url', document.getElementById('themeDemoUrl').value.trim());
      formData.append('enabled', document.getElementById('themeEnabled').checked ? 'true' : 'false');
      formData.append('premium_required', document.getElementById('themePremium').checked ? 'true' : 'false');
      formData.append('preview', previewFile);

      try {
        const res = await fetch('/admin/themes', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) {
          closeModal('themeModal');
          loadThemes();
          showToast('已创建');
        } else {
          showToast(data.error || '操作失败');
        }
      } catch (e) {
        showToast('操作失败');
        console.error('saveTheme error:', e);
      }
    }

    async function checkThemeRepo(slug) {
      try {
        const res = await fetch('/admin/themes/' + encodeURIComponent(slug) + '/check');
        const data = await res.json();
        if (data.ok) {
          showToast('仓库可用，版本: v' + (data.version || '未知'));
        } else {
          showToast(data.error || '仓库不可用', 'error');
        }
      } catch (e) {
        showToast('检查失败', 'error');
      }
    }

    // ============ 激活码管理 ============

    async function loadPremiumCodes() {
      try {
        const status = document.getElementById('premiumFilterStatus').value;
        const params = new URLSearchParams();
        if (status) params.set('status', status);

        const res = await fetch('/admin/premium/codes?' + params);
        const data = await res.json();
        const tbody = document.getElementById('premiumList');

        if (!data.codes || !data.codes.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty">暂无激活码</td></tr>';
          return;
        }

        tbody.innerHTML = data.codes.map(c => {
          const daysLabel = c.days === -1 ? '永久' : c.days;
          return '<tr>' +
            '<td><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;font-size:12px">' + escapeHtml(c.code) + '</code></td>' +
            '<td>' + daysLabel + '</td>' +
            '<td><span class="badge ' + (c.status === 'used' ? 'badge-default' : 'badge-success') + '">' + (c.status === 'used' ? '已使用' : '未使用') + '</span></td>' +
            '<td>' + (c.start_time || '-') + '</td>' +
            '<td>' + (c.created_at || '-') + '</td>' +
            '<td>-</td>' +
          '</tr>';
        }).join('');
      } catch (e) {
        document.getElementById('premiumList').innerHTML = '<tr><td colspan="6" class="empty">加载失败</td></tr>';
      }
    }

    function openGenerateModal() {
      document.getElementById('genDays').value = '';
      document.getElementById('genCount').value = '10';
      openModal('generateModal');
    }

    async function generateCodes() {
      const days = parseInt(document.getElementById('genDays').value);
      const count = parseInt(document.getElementById('genCount').value);

      if ((!days && days !== 0) || (days !== -1 && days <= 0)) {
        showToast('请输入有效的天数（-1 = 永久）');
        return;
      }
      if (!count || count < 1) {
        showToast('请输入有效的数量');
        return;
      }

      const body = { days, count };

      try {
        const res = await fetch('/admin/premium/codes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.success) {
          closeModal('generateModal');
          document.getElementById('generatedCodesCount').textContent = '共 ' + data.count + ' 个激活码';
          document.getElementById('generatedCodesText').value = data.codes.join('\n');
          openModal('generatedCodesModal');
          loadPremiumCodes();
        } else {
          showToast(data.error || '生成失败');
        }
      } catch (e) {
        showToast('生成失败');
      }
    }

    function copyGeneratedCodes() {
      const textarea = document.getElementById('generatedCodesText');
      textarea.select();
      navigator.clipboard.writeText(textarea.value).then(() => {
        showToast('已复制到剪贴板');
      });
    }

    // 初始化
    document.getElementById('loadingPage').classList.add('hidden');
    document.getElementById('adminPage').classList.remove('hidden');
    loadDashboard();
  </script>
</body>
</html>
