name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      matrix:
        target: [admin, blog, server]
        include:
          - target: admin
            image_name: flec-admin
            context: ./admin
            output_dir: dist
          - target: blog
            image_name: flec-blog
            context: ./blog
            output_dir: .output
          - target: server
            image_name: flec-server
            context: ./server
            output_dir: ""

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 登录 Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 生成标签
        id: tags
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}"
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" =~ (alpha|beta|rc|pre) ]]; then
            echo "tags=${IMAGE}:${VERSION}" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "📦 检测到预发布版本: v${VERSION} (不打 latest 标签)"
          else
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "🚀 正式版本: v${VERSION} (打 latest 标签)"
          fi

      - name: 设置 Go 环境
        if: matrix.target == 'server'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            PANEL_API_KEY=${{ secrets.PANEL_API_KEY }}

  native:
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: 构建 Admin 前端
        working-directory: admin
        run: |
          npm ci
          npm run build

      - name: 复制 Admin 到 Server embed 目录
        run: |
          mkdir -p server/cmd/admin
          cp -r admin/dist/* server/cmd/admin/

      - name: 设置 Go 环境
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      - name: 交叉编译原生部署二进制
        working-directory: server
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p dist

          prepare_package() {
            local pkg_dir=$1
            mkdir -p ${pkg_dir}
            cp -r templates ${pkg_dir}/
            cp .env.example ${pkg_dir}/.env.example
            echo "请将 .env.example 复制为 .env 并配置相关参数" > ${pkg_dir}/README.txt
          }

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -tags embed_admin -ldflags="-s -w -X 'flec_blog/internal/service.AppVersion=${VERSION}' -X 'flec_blog/pkg/panel.PanelAPIKey=${{ secrets.PANEL_API_KEY }}'" -o flec-server ./cmd/
          prepare_package "dist/flec-server_linux_amd64"
          mv flec-server dist/flec-server_linux_amd64/flec-server
          tar -czf dist/flec-server_linux_amd64.tar.gz -C dist flec-server_linux_amd64
          rm -rf dist/flec-server_linux_amd64

          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -tags embed_admin -ldflags="-s -w -X 'flec_blog/internal/service.AppVersion=${VERSION}' -X 'flec_blog/pkg/panel.PanelAPIKey=${{ secrets.PANEL_API_KEY }}'" -o flec-server ./cmd/
          prepare_package "dist/flec-server_linux_arm64"
          mv flec-server dist/flec-server_linux_arm64/flec-server
          tar -czf dist/flec-server_linux_arm64.tar.gz -C dist flec-server_linux_arm64
          rm -rf dist/flec-server_linux_arm64

      - name: 上传原生部署构建产物
        uses: actions/upload-artifact@v7
        with:
          name: native-dist
          path: server/dist/flec-server_*.tar.gz
          retention-days: 1

  release:
    needs: [build, native]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 打包 Blog 源码
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          tar -czhf flec-blog.tar.gz \
            --exclude='node_modules' \
            --exclude='.nuxt' \
            --exclude='.output' \
            --exclude='.env' \
            blog/

      - name: 下载原生部署构建产物
        uses: actions/download-artifact@v8
        with:
          name: native-dist
          path: native/dist/

      - name: 生成 Changelog
        id: changelog
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges --invert-grep --grep="^hub:")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -10 --invert-grep --grep="^hub:")
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- 无功能性更新"
          fi

          if [[ "$VERSION" =~ (alpha|beta|rc|pre) ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi

          cat > release_notes.md << EOF
          ## 🎉 版本 ${VERSION} 发布

          ### 📋 构建信息
          - **版本**: v${VERSION}
          - **Commit**: ${GITHUB_SHA:0:7}
          - **构建时间**: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          ### 📝 更新内容
          ${COMMITS}

          ### 📦 Docker 镜像
          - 管理端: \`${{ secrets.DOCKERHUB_USERNAME }}/flec-admin:${VERSION}\`
          - 博客端: \`${{ secrets.DOCKERHUB_USERNAME }}/flec-blog:${VERSION}\`
          - 服务端: \`${{ secrets.DOCKERHUB_USERNAME }}/flec-server:${VERSION}\`
          EOF

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          draft: false
          prerelease: ${{ steps.changelog.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
          files: |
            flec-blog.tar.gz
            native/dist/*.tar.gz
