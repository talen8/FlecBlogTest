name: PR Check

on:
  pull_request:
    branches: [main]

# 并发控制：同一 PR 的新提交会取消旧的运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 变更检测：只检查有变化的文件
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      admin: ${{ steps.filter.outputs.admin }}
      blog: ${{ steps.filter.outputs.blog }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            admin:
              - 'admin/**'
            blog:
              - 'blog/**'

  # 服务端代码检查
  server-check:
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: 下载依赖
        run: go mod download

      - name: 编译检查
        id: build
        run: go build -v ./...
        continue-on-error: true

      - name: 汇总检查结果
        run: |
          if [ "${{ steps.build.outcome }}" == "failure" ]; then
            echo "❌ 编译失败: 修复编译错误"
            exit 1
          fi

  # 管理端代码检查
  admin-check:
    needs: changes
    if: ${{ needs.changes.outputs.admin == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        id: typecheck
        run: npm run type-check
        continue-on-error: true

      - name: 构建检查
        id: build
        run: npm run build
        continue-on-error: true

      - name: 汇总检查结果
        run: |
          has_error=false

          if [ "${{ steps.typecheck.outcome }}" == "failure" ]; then
            echo "❌ 类型检查失败: 修复类型错误"
            has_error=true
          fi

          if [ "${{ steps.build.outcome }}" == "failure" ]; then
            echo "❌ 构建失败: 确保能正常构建"
            has_error=true
          fi

          if [ "$has_error" == "true" ]; then
            exit 1
          fi

  # 博客端代码检查
  blog-check:
    needs: changes
    if: ${{ needs.changes.outputs.blog == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: blog/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        id: typecheck
        run: npm run type-check
        continue-on-error: true

      - name: 构建检查
        id: build
        run: npm run build
        continue-on-error: true

      - name: 汇总检查结果
        run: |
          has_error=false

          if [ "${{ steps.typecheck.outcome }}" == "failure" ]; then
            echo "❌ 类型检查失败: 修复类型错误"
            has_error=true
          fi

          if [ "${{ steps.build.outcome }}" == "failure" ]; then
            echo "❌ 构建失败: 确保能正常构建"
            has_error=true
          fi

          if [ "$has_error" == "true" ]; then
            exit 1
          fi
